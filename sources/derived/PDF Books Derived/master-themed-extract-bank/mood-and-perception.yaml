- extract_id: e16
  source_id: psychology-of-sociability-p4--96834b
  page_refs:
  - pp. 269
  theme: trust-and-gullibility
  role: finding
  claim: Negative mood reduced trust and improved deception detection; positive mood increased trust and in some cases gullibility.
  why_it_matters: Supports mood-aware guidance around difficult conversations and premature reassurance.
  usable_for:
  - repair/mood-aware-repair
  confidence: medium
  evidence_type: direct
  notes: Avoid making distrust sound virtuous.
  provenance:
