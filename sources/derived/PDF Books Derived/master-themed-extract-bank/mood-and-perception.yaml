- extract_id: e15
  source_id: psychology-of-sociability-p4--96834b
  page_refs:
  - pp. 267-269
  theme: fairness
  role: finding
  claim: In strategic allocation tasks, sad participants behaved more fairly and were more likely to reject unfair offers than happy participants.
  why_it_matters: Supports the idea that emotional state can shape fairness and self-interest in negotiation.
  usable_for:
  - repair/mood-aware-repair
  confidence: medium
  evidence_type: direct
  notes: Laboratory finding only; translate modestly.
  provenance:
