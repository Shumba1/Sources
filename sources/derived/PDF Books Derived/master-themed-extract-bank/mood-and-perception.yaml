- extract_id: e14
  source_id: psychology-of-sociability-p4--96834b
  page_refs:
  - pp. 263-267
  theme: processing-style
  role: mechanism
  claim: Negative mood tends to recruit more attentive, concrete, accommodative processing; positive mood tends to recruit more top-down, assimilative processing.
  why_it_matters: Supports advice to slow down certainty and check details when conflict is emotionally loaded.
  usable_for:
  - repair/mood-aware-repair
  confidence: medium-high
  evidence_type: direct
  notes: Must not be oversold.
