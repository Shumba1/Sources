  theme: arousal-model
  role: knowledge
  claim: As couples age, eroticism, desire, and emotional connection increasingly matter because pure drive and automatic reflex become less reliable foundations for satisfying sex.
  why_it_matters: Helps explain why mechanically repeating what once worked often fails later, and why deeper connection becomes structurally important rather than optional.
  usable_for:
