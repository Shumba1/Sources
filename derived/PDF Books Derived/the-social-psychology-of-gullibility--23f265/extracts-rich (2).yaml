source_key: the-mask-of-love-and-sexual-gullibility--e534e1
source_id: SRC-E534E1
chapter_scope: Chapter 2 only
extract_cards:
- extract_id: EXT-E534E1-01
  source_id: SRC-E534E1
  page_refs: pp. 23-24
  theme: desire-and-familiarity
  role: knowledge
  audience: both
  claim: Early romantic intensity can distort partner assessment and inflate commitment
    confidence.
  why_it_matters: MarriageOS can use this to explain why couples often feel shocked
    later by patterns that were already faintly present early on.
  usable_for:
  - knowledge/desire-and-familiarity
  - repair/desire-drift-reset
  confidence: high
  evidence_type: direct
  status: keep
  marriage_os_translation: Treat the early phase as a bonding amplifier, not as a
    clean forecast of the settled relationship.
  notes: Derived from the chapter’s discussion of idealisation and optimistic distortion
    during passionate love.
- extract_id: EXT-E534E1-02
  source_id: SRC-E534E1
  page_refs: pp. 23-24
  theme: how-drift-starts
  role: knowledge
  audience: both
  claim: Traits that feel magnetic early can later become friction points once the
    idealising phase fades.
  why_it_matters: Useful for helping couples separate “you changed” from “I am seeing
    the trait differently now”.
  usable_for:
  - knowledge/desire-and-familiarity
  - knowledge/early-bonding-and-idealisation
  confidence: high
  evidence_type: direct
  status: keep
  marriage_os_translation: Early attraction is not proof that a trait will feel easy
    under routine, stress, or family load.
  notes: Safe, high-value translation of the source’s discussion of initially attractive
    qualities becoming later complaints.
- extract_id: EXT-E534E1-03
  source_id: SRC-E534E1
  page_refs: pp. 24-26
  theme: bridge-content
  role: knowledge
  audience: both
  claim: Strong bonds are partly maintained by partner-protective interpretations;
    distressed bonds lose that interpretive buffer.
  why_it_matters: This gives MarriageOS a non-moralising way to explain why the exact
    same event can feel generous in one season and offensive in another.
  usable_for:
  - knowledge/desire-and-familiarity
  - repair/desire-drift-reset
  confidence: medium
  evidence_type: direct
  status: keep
  marriage_os_translation: How you explain your partner’s behaviour matters almost
    as much as the behaviour itself.
  notes: Pulled from the section on partner-serving attributions.
- extract_id: EXT-E534E1-04
  source_id: SRC-E534E1
  page_refs: pp. 24-26
  theme: desire-maintenance
  role: knowledge
  audience: both
  claim: Early love can temporarily increase warmth, positivity, and commitment signals,
    making each partner look more relationally capable than their long-run baseline.
  why_it_matters: Useful for explaining why the early phase can feel effortless and
    why later maintenance cannot rely on momentum alone.
  usable_for:
  - knowledge/desire-and-familiarity
  - repair/desire-drift-reset
  confidence: medium
  evidence_type: direct
  status: keep
  marriage_os_translation: Some of what felt natural early was a temporary state,
    not a self-maintaining system.
  notes: This is the safest usable slice of the chapter’s “mask of love” argument.
- extract_id: EXT-E534E1-05
  source_id: SRC-E534E1
  page_refs: pp. 25-26, 35-36
  theme: system-decay-system-repair
  role: repair
  audience: both
  claim: Long relationships eventually require reality-based recalibration from the
    idealised early version of the partner to the actual person and the actual pattern.
  why_it_matters: This is a direct bridge from theory into a repair-first expectation
    reset.
  usable_for:
  - repair/desire-drift-reset
  - knowledge/desire-and-familiarity
  confidence: high
  evidence_type: derived
  status: keep
  marriage_os_translation: Repair begins when the couple stops negotiating with the
    fantasy version of the relationship.
  notes: Derived from the source’s argument that standards shift after commitment
    and that the “mask” does not hold forever.
- extract_id: EXT-E534E1-06
  source_id: SRC-E534E1
  page_refs: pp. 30-32
  theme: desire-and-familiarity
  role: knowledge
  audience: both
  claim: Early sexual frequency and intensity are a poor long-term forecast; couples
    often assume continuity that the settled bond does not automatically deliver.
  why_it_matters: This is one of the clearest MarriageOS-relevant patterns in the
    chapter and explains why later disappointment often feels like betrayal.
  usable_for:
  - knowledge/desire-and-familiarity
  - repair/desire-drift-reset
  confidence: medium
  evidence_type: direct
  status: keep
  marriage_os_translation: Do not treat the honeymoon pattern as the permanent contract.
  notes: Useful but must be de-gendered and kept away from grievance language.
- extract_id: EXT-E534E1-07
  source_id: SRC-E534E1
  page_refs: pp. 32-35
  theme: one-sided-initiation
  role: repair
  audience: both
  claim: One partner can experience lower desire while still feeling committed; the
    other can experience that same change as withdrawal, rejection, or a broken deal.
  why_it_matters: This creates a bridge frame that keeps MarriageOS out of blame camps
    and inside repair logic.
  usable_for:
  - repair/desire-drift-reset
  - knowledge/desire-and-familiarity
  confidence: high
  evidence_type: derived
  status: keep
  marriage_os_translation: Two people can be interpreting the same pattern in opposite
    ways and both feel hurt.
  notes: This is the cleanest product translation of the chapter’s bilateral mismatch
    argument.
- extract_id: EXT-E534E1-08
  source_id: SRC-E534E1
  page_refs: pp. 33-35
  theme: bridge-content
  role: repair
  audience: both
  claim: Couples can drift into resentment when they never explicitly align what commitment,
    fidelity, affection, attention, and sex each person thinks the bond includes.
  why_it_matters: This is highly usable for a practical module built around expectation
    audit and re-contracting.
  usable_for:
  - repair/desire-drift-reset
  confidence: high
  evidence_type: derived
  status: keep
  marriage_os_translation: Unspoken terms become hidden injuries.
  notes: Strong product logic extracted from the “different understandings” section.
- extract_id: EXT-E534E1-09
  source_id: SRC-E534E1
  page_refs: pp. 28, 32
  theme: how-drift-starts
  role: knowledge
  audience: both
  claim: High attachment can make people slow to update their view even after the
    relational pattern has already changed.
  why_it_matters: This helps explain why a couple can stay stuck in stale expectations
    long after the evidence has shifted.
  usable_for:
  - knowledge/desire-and-familiarity
  - repair/desire-drift-reset
  confidence: medium
  evidence_type: direct
  status: keep
  marriage_os_translation: Attachment can preserve hope and also delay honest pattern-reading.
  notes: Useful as a knowledge-side explanation for why expectation reset is emotionally
    hard.
- extract_id: EXT-E534E1-10
  source_id: SRC-E534E1
  page_refs: pp. 33-35
  theme: repair-scripts
  role: repair
  audience: both
  claim: When the couple feels trapped in a changed-deal experience, the adult move
    is explicit re-contracting rather than silent scorekeeping, pressure, or accusation.
  why_it_matters: This gives the repair module a clean operational centre and keeps
    the output symptom-led.
  usable_for:
  - repair/desire-drift-reset
  confidence: medium
  evidence_type: derived
  status: keep
  marriage_os_translation: Name the mismatch, clarify the meanings, and agree the
    next pattern on purpose.
  notes: Direct MarriageOS translation rather than source wording.
- extract_id: EXT-E534E1-11
  source_id: SRC-E534E1
  page_refs: pp. 35-36
  theme: repair-scripts
  role: repair
  audience: both
  claim: Desire drift should not be framed as deliberate fraud by default; the safer
    working assumption is often unrecognised mismatch unless there is evidence of
    conscious deceit.
  why_it_matters: This protects the product from grievance coding while still allowing
    hurt to be named honestly.
  usable_for:
  - repair/desire-drift-reset
  - knowledge/desire-and-familiarity
  confidence: medium
  evidence_type: derived
  status: keep
  marriage_os_translation: Treat the first conversation as pattern clarification,
    not a courtroom.
  notes: Supported by the chapter’s repeated insistence that the misrepresentation
    is often not deliberate.
- extract_id: EXT-E534E1-12
  source_id: SRC-E534E1
  page_refs: pp. 21-22, 26-35
  theme: marriage-as-system
  role: doctrine
  audience: both
  claim: The chapter is built on a heterosexual, monogamous, evolutionary model and
    should not be imported into MarriageOS as universal relational doctrine.
  why_it_matters: This protects the pipeline from quietly adopting a narrow worldview
    as settled product truth.
  usable_for:
  - doctrine/source-filtering
  confidence: high
  evidence_type: editorial-observation
  status: caution
  marriage_os_translation: Use only the repair-relevant mechanism, not the full worldview.
  notes: Keep as a filter note, not as user-facing content.
- extract_id: EXT-E534E1-13
  source_id: SRC-E534E1
  page_refs: pp. 33-35
  theme: desire-and-familiarity
  role: doctrine
  audience: both
  claim: The source sometimes treats sex as quasi-transactional and frames mismatch
    in “bait and switch” terms; that language should be quarantined even where the
    underlying expectation-mismatch insight is retained.
  why_it_matters: It isolates the usable mechanism from the most grievance-prone and
    non-canonical wording.
  usable_for:
  - doctrine/source-filtering
  - repair/desire-drift-reset
  confidence: high
  evidence_type: editorial-observation
  status: caution
  marriage_os_translation: Keep the insight; reject the market-style framing.
  notes: Important because the product cannot sound like a manifesto about sexual
    leverage.
