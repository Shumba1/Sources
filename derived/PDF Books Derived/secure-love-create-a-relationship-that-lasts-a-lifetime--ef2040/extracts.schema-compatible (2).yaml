- extract_id: EXT-SL-019
  source_id: SRC-SL-001
  theme: sexual-connection
  role: repair
  claim: Sexual connection is strongly shaped by the attachment climate; conversations
    about sex rarely improve while the couple is still inside a negative cycle.
  why_it_matters: Makes sex a bond issue rather than an isolated performance issue.
  usable_for:
  - repair/pressure-loop
  - knowledge/desire-and-familiarity
  confidence: high
  notes: Very compatible with MarriageOS anti-pressure doctrine.
- extract_id: EXT-SL-020
  source_id: SRC-SL-001
  theme: sexual-pursue-withdraw
  role: repair
  claim: In anxious-avoidant pairings, sexual pursue / withdraw often mirrors the
    broader relationship cycle, with rejection pain, shame, and avoidance feeding
    each other.
  why_it_matters: Strong direct feeder for pressure-loop.
  usable_for:
  - repair/pressure-loop
  - knowledge/desire-and-familiarity
  confidence: high
  notes: Strongest sex-specific mechanism in the book.
- extract_id: EXT-SL-021
  source_id: SRC-SL-001
  theme: sexual-withdrawal
  role: repair
  claim: Sexual withdrawal often has a valid explanation—overwhelm, resentment, rejection
    history, trauma, self-care collapse, parenting depletion, or medical issues—and
    should be explored rather than moralised.
  why_it_matters: Keeps MarriageOS from treating low desire as stubbornness or rejection
    alone.
  usable_for:
  - repair/pressure-loop
  - knowledge/desire-and-familiarity
  confidence: high
  notes: Excellent empathy-restoring material.
- extract_id: EXT-SL-022
  source_id: SRC-SL-001
  theme: sexual-trauma
  role: caution
  claim: Sexual problems may be trauma-related, including trauma that was not overtly
    sexual; coercion or shame around sex requires special care and sometimes outside
    help.
  why_it_matters: Essential boundary logic for desire and intimacy content.
  usable_for:
  - repair/pressure-loop
  - escalation/seek-support
  confidence: high
  notes: Keep trauma-aware and non-assumptive.
- extract_id: EXT-SL-023
  source_id: SRC-SL-001
  theme: abuse-boundary
  role: triage
  claim: The book explicitly excludes abusive relationships from its repair framework
    and recommends outside safety guidance for coercive or controlling dynamics.
  why_it_matters: Hard boundary for MarriageOS product doctrine.
  usable_for:
  - repair/we-keep-fighting
  - repair/pressure-loop
  - repair/quiet-drift
