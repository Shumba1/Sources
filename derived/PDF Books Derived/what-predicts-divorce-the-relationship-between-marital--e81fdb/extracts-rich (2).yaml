- extract_id: EXT-WPD-001
  source_id: SRC-WPD-001
  theme: negative-reciprocity
  role: repair
  claim: 'Unhappy couples are distinguished not just by negativity but by negative
    reciprocity: once negativity starts, it is harder for them to exit it.'
  why_it_matters: This gives MarriageOS a cleaner process definition for 'we keep
    fighting' than generic 'communicate better' advice.
  usable_for:
  - repair/we-keep-fighting
  - knowledge/conflict-styles-and-stability
  confidence: high
  notes: Core doctrine source. Translate into accessible pattern language.
- extract_id: EXT-WPD-002
  source_id: SRC-WPD-001
  theme: repair-failure
  role: repair
  claim: When negative affect becomes an absorbing state, ordinary repair moves stop
    working because partners respond to the negativity rather than the repair attempt.
  why_it_matters: Explains why some couples keep missing each other's de-escalation
    bids.
  usable_for:
  - repair/we-keep-fighting
  confidence: high
  notes: High-value mechanism.
- extract_id: EXT-WPD-003
  source_id: SRC-WPD-001
  theme: four-horsemen
  role: repair
  claim: Not all negative behaviors are equal; criticism, contempt, defensiveness,
    and stonewalling are especially corrosive and may operate as a cascade.
  why_it_matters: Strong basis for escalation triage and branch logic.
  usable_for:
  - repair/we-keep-fighting
  - knowledge/conflict-styles-and-stability
  confidence: high
  notes: A major doctrine import.
- extract_id: EXT-WPD-004
  source_id: SRC-WPD-001
  theme: flooding
  role: repair
  claim: Flooding is the state of feeling overwhelmed, disorganized, and physiologically
    overactivated by a partner's negative affect.
  why_it_matters: Useful for naming shutdown without moralising it.
  usable_for:
  - repair/we-keep-fighting
  - repair/quiet-drift
  confidence: high
  notes: Translate DPA/flooding into simpler user language.
- extract_id: EXT-WPD-005
  source_id: SRC-WPD-001
  theme: distance-and-isolation
  role: repair
  claim: 'Flooding can begin a distance-and-isolation cascade: problems feel severe,
    discussion feels pointless, partners solve things alone, lives go parallel, loneliness
    grows.'
  why_it_matters: Excellent doctrine support for drift and dead-marriage pathways.
  usable_for:
  - repair/quiet-drift
  - knowledge/conflict-styles-and-stability
  confidence: high
  notes: One of the strongest source-to-product translations.
- extract_id: EXT-WPD-006
  source_id: SRC-WPD-001
  theme: conflict-styles
  role: knowledge
  claim: Stable marriages are not all identical; some are validating, some volatile,
    and some conflict-avoiding, while instability is more tied to dysregulation than
    to one style alone.
  why_it_matters: Prevents MarriageOS from confusing all conflict avoidance with dysfunction
    or all emotion with instability.
  usable_for:
  - knowledge/conflict-styles-and-stability
  confidence: high
  notes: Important anti-oversimplification extract.
- extract_id: EXT-WPD-007
  source_id: SRC-WPD-001
  theme: oral-history
  role: knowledge
  claim: 'How partners tell the story of the relationship matters: fondness, we-ness,
    expansiveness, and shared meaning point in a different direction from disappointment,
    separateness, and chaos.'
  why_it_matters: Useful for article-level explanation of how drift rewrites the relationship
    story.
  usable_for:
  - repair/quiet-drift
  - knowledge/conflict-styles-and-stability
  confidence: high
  notes: Good for subtle drift content.
- extract_id: EXT-WPD-008
  source_id: SRC-WPD-001
  theme: conflict-avoidance
  role: knowledge
  claim: Conflict avoidance is not automatically dysfunctional; the relevant question
    is whether the relationship remains regulated, connected, and non-lonely.
  why_it_matters: Keeps MarriageOS from pathologising every lower-conflict pair.
  usable_for:
  - knowledge/conflict-styles-and-stability
  confidence: high
  notes: Important nuance.
- extract_id: EXT-WPD-009
  source_id: SRC-WPD-001
  theme: listener-withdrawal
  role: repair
  claim: Listener withdrawal and stonewalling become especially destructive when they
    lock in repeated negative exchanges and reduce the couple's ability to edit, validate,
    and recover.
  why_it_matters: Useful for fight and shutdown modules.
  usable_for:
  - repair/we-keep-fighting
  confidence: medium-high
  notes: Do not over-gender in final copy.
- extract_id: EXT-WPD-010
  source_id: SRC-WPD-001
  theme: parallel-lives
  role: repair
  claim: Couples can remain together in outward form while emotionally splitting into
    parallel lives.
  why_it_matters: Direct fit for quiet drift and 'dead marriage' logic.
  usable_for:
  - repair/quiet-drift
  confidence: high
  notes: High-value language source.
